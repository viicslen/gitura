version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - gocyclo
    - godot
    - revive
  settings:
    gocyclo:
      min-complexity: 10
    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false
          arguments:
            - "checkPrivateReceivers"
            - "sayRepetitiveInsteadOfStutters"
  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - gocyclo
          - errcheck
          - revive

formatters:
  enable:
    - gofmt
