run:
  timeout: 5m

linters:
  enable:
    - gofmt
    - govet
    - golint
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - gocyclo
    - godot
    - revive

linters-settings:
  gocyclo:
    min-complexity: 10
  revive:
    rules:
      - name: exported
        severity: warning
        disabled: false
        arguments:
          - "checkPrivateReceivers"
          - "sayRepetitiveInsteadOfStutters"

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - gocyclo
        - errcheck
