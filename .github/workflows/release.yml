name: Release

on:
  release:
    types: [created]

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-22.04
            platform: linux/amd64
            binary: gitura
            asset_name: gitura-linux-amd64

          - os: macos
            runner: macos-latest
            platform: darwin/universal
            binary: gitura
            asset_name: gitura-macos-universal

          - os: windows
            runner: windows-latest
            platform: windows/amd64
            binary: gitura.exe
            asset_name: gitura-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install Linux system dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build
        run: wails build -platform ${{ matrix.platform }} -ldflags "-X 'main.githubClientID=${{ secrets.GITHUB_CLIENT_ID }}'"
        env:
          CGO_ENABLED: 1

      - name: Rename binary
        run: mv build/bin/${{ matrix.binary }} build/bin/${{ matrix.asset_name }}
        shell: bash

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/${{ matrix.asset_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
